spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:lb://user-service}
              predicates:
                - Path=/api/v1/users/**, /api/v1/cards/**
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:lb://auth-service}
              predicates:
                - Path=/api/v1/auth/**
            - id: order-service
              uri: ${ORDER_SERVICE_URL:lb://order-service}
              predicates:
                - Path=/api/v1/orders/**, /api/v1/items/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:lb://payment-service}
              predicates:
                - Path=/api/v1/payments/**
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

services:
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8080}

grpc:
  client:
    auth-service:
      address: ${AUTH_GRPC_ADDR:discovery:///auth-service}
      negotiation-type: plaintext
    user-service:
      address: ${USER_GRPC_ADDR:discovery:///user-service}
      negotiation-type: plaintext
logging:
  level:
    com.innowise: ${APP_LOGGING_LEVEL:info}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true