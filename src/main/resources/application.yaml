spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**, /api/v1/cards/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**, /api/v1/items/**
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
grpc:
  client:
    auth-service:
      address: discovery:///auth-service
      negotiation-type: plaintext
    user-service:
      address: discovery:///user-service
      negotiation-type: plaintext