services:
  api-gateway:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: arseniherasimovichinnowise/api-gateway
    ports:
      - '8080:8080'
    networks:
      - backend-net
    environment:
      - APP_LOGGING_LEVEL=debug

  user-service:
    image: arseniherasimovichinnowise/user-service:latest
    depends_on:
      - user-service-db
      - user-service-redis
    networks:
      - backend-net
      - user-service-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_SECONDARY_PROFILE=dev
      - APP_LOGGING_LEVEL=debug
      - DB_HOST=user-service-db
      - DB_USER=${USER_DB_USER}
      - DB_PASSWORD=${USER_DB_PASSWORD}
      - DB_NAME=${USER_DB_NAME}
      - REDIS_HOST=user-service-redis
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  user-service-db:
    image: postgres:15
    volumes:
      - user-service-postgres-data:/var/lib/postgresql/data
    networks:
      - user-service-net
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}

  user-service-redis:
    image: redis:7
    volumes:
      - user-service-redis-data:/data
    networks:
      - user-service-net
    command: redis-server --appendonly yes

  discovery-service:
    image: arseniherasimovichinnowise/discovery-service:latest
    ports:
      - '8761'
    networks:
      - backend-net
    environment:
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false

  order-service:
    image: arseniherasimovichinnowise/order-service:latest
    depends_on:
      - order-service-db
    networks:
      - backend-net
      - order-service-net
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-0:9090,kafka-1:9090,kafka-2:9090
      - SPRING_PROFILES_ACTIVE=docker
      - APP_LOGGING_LEVEL=debug
      - DB_HOST=order-service-db
      - DB_USER=${ORDER_DB_USER}
      - DB_PASSWORD=${ORDER_DB_PASSWORD}
      - DB_NAME=${ORDER_DB_NAME}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  order-service-db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    networks:
      - order-service-net
    volumes:
      - order-service-postgres-data:/var/lib/postgresql/data


  auth-service:
    image: arseniherasimovichinnowise/auth-service:latest
    depends_on:
      - auth-service-db
    networks:
      - backend-net
      - auth-service-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=auth-service-db
      - DB_USER=${AUTH_DB_USER}
      - DB_PASSWORD=${AUTH_DB_PASSWORD}
      - DB_NAME=${AUTH_DB_NAME}
      - APP_LOGGING_LEVEL=debug
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${AUTH_JWT_SECRET}

  auth-service-db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    networks:
      - auth-service-net
    volumes:
      - auth-service-postgres-data:/var/lib/postgresql/data

  payment-service:
    image: arseniherasimovichinnowise/payment-service:latest
    networks:
      - payment-service-net
      - backend-net
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-0:9090,kafka-1:9090,kafka-2:9090
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_HOST: payment-service-mongo

  payment-service-mongo:
    image: mongo:6
    restart: always
    ports:
      - '27017:27017'
    networks:
      - payment-service-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - payment-service-mongo-data:/data/db

  kafka-0:
    image: apache/kafka:latest
    networks:
      - backend-net
    volumes:
      - kafka-data-0:/var/lib/kafka/data
    environment:
      CLUSTER_ID: 6fb4e62b-5578-4152-9185-23f5cd5747cf
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9091, 1@kafka-1:9091, 2@kafka-2:9091
      KAFKA_LISTENERS: INTERNAL://:9090,CONTROLLER://:9091
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9090
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  kafka-1:
    image: apache/kafka:latest
    networks:
      - backend-net
    volumes:
      - kafka-data-1:/var/lib/kafka/data
    environment:
      CLUSTER_ID: 6fb4e62b-5578-4152-9185-23f5cd5747cf
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9091, 1@kafka-1:9091, 2@kafka-2:9091
      KAFKA_LISTENERS: INTERNAL://:9090,CONTROLLER://:9091
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9090
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  kafka-2:
    image: apache/kafka:latest
    networks:
      - backend-net
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    environment:
      CLUSTER_ID: 6fb4e62b-5578-4152-9185-23f5cd5747cf
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9091, 1@kafka-1:9091, 2@kafka-2:9091
      KAFKA_LISTENERS: INTERNAL://:9090,CONTROLLER://:9091
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9090
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL


volumes:
  user-service-postgres-data: {}
  user-service-redis-data: {}
  order-service-postgres-data: {}
  auth-service-postgres-data: {}
  payment-service-mongo-data: { }
  kafka-data-0: { }
  kafka-data-1: { }
  kafka-data-2: { }

networks:
  backend-net:
    external: true
  user-service-net:
    driver: bridge
  order-service-net:
    driver: bridge
  auth-service-net:
    driver: bridge
  payment-service-net:
    driver: bridge